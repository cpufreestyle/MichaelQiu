<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .lottery-display {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            border-radius: 15px;
            padding: 60px 30px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }
        
        #name-display {
            font-size: 3em;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .controls {
            margin-bottom: 30px;
        }
        
        button {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .winner-section {
            margin-top: 30px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        #winner-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        #winner-list li {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .lottery-display {
                padding: 40px 20px;
            }
            
            #name-display {
                font-size: 2em;
            }
            
            button {
                padding: 12px 30px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>抽奖程序</h1>
        
        <div class="lottery-display">
            <div id="name-display">点击开始</div>
        </div>
        
        <div class="controls">
            <button id="start-btn">开始</button>
            <button id="stop-btn" disabled>停止</button>
        </div>
        
        <div class="winner-section">
            <h2>中奖记录</h2>
            <ul id="winner-list"></ul>
        </div>
    </div>
    
    <script>
        // 参与抽奖的人员名单
        let participants = [
            '郑文哲', '赵江', '于珊', '谢术平', '徐珺烨', '陈宏樑', '唐克勇', '杨帆',
            '童燕', '沈清', '陆益波', '夏燕', '顾晓佳', '陈珏', '聂颖祺', '骆涉宇',
            '周世强', '吴嵩', '丁兆峰', '潘安迪', '支宏愿', '王丽璟', '王敏捷', '朱云',
            '沈懿瑶', '韩君懿', '徐颖文', '李玉霞', '徐辉', '陶如洁', '张浩笛', '郭佳红',
            '蔡诚杰', '方宇轩', '吴慧麟', '邱明'
        ];
        
        // 中奖名单
        let winners = [];
        
        // 定时器ID
        let lotteryInterval;
        
        // DOM元素
        const nameDisplay = document.getElementById('name-display');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const winnerList = document.getElementById('winner-list');
        
        // 开始抽奖
        function startLottery() {
            if (participants.length === 0) {
                alert('所有人员都已中奖！');
                return;
            }
            
            // 禁用开始按钮，启用停止按钮
            startBtn.disabled = true;
            stopBtn.disabled = false;
            
            // 开始滚动名字
            lotteryInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * participants.length);
                nameDisplay.textContent = participants[randomIndex];
            }, 100);
        }
        
        // 停止抽奖
        function stopLottery() {
            // 清除定时器
            clearInterval(lotteryInterval);
            
            // 获取当前显示的名字（中奖者）
            const winner = nameDisplay.textContent;
            
            // 添加到中奖名单
            winners.push(winner);
            
            // 从参与名单中移除中奖者
            participants = participants.filter(name => name !== winner);
            
            // 更新中奖记录显示
            updateWinnerList();
            
            // 启用开始按钮，禁用停止按钮
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            // 显示中奖信息
            alert(`恭喜 ${winner} 中奖！`);
            
            // 检查是否所有人员都已中奖
            if (participants.length === 0) {
                startBtn.disabled = true;
                nameDisplay.textContent = '抽奖结束';
                alert('所有人员都已中奖，抽奖结束！');
            }
        }
        
        // 更新中奖记录
        function updateWinnerList() {
            winnerList.innerHTML = '';
            winners.forEach((winner, index) => {
                const li = document.createElement('li');
                li.textContent = `第 ${index + 1} 名: ${winner}`;
                winnerList.appendChild(li);
            });
        }
        
        // 事件监听
        startBtn.addEventListener('click', startLottery);
        stopBtn.addEventListener('click', stopLottery);
    </script>
</body>
</html>
